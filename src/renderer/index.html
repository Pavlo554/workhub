<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://www.gstatic.com https://cdnjs.cloudflare.com https://www.googletagmanager.com;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com;
    img-src 'self' data: blob: https://*.googleapis.com https://*.firebasestorage.app;
    connect-src 'self'
      https://*.firebaseio.com
      https://*.googleapis.com
      https://*.firebasestorage.app
      https://api.telegram.org
      https://api.coingecko.com
      https://bank.gov.ua
      https://www.google-analytics.com
      https://analytics.google.com
      https://www.googletagmanager.com
      wss://*.firebaseio.com;
  ">
  <title>WorkHub</title>

  <!-- DNS prefetch for external resources -->
  <link rel="dns-prefetch" href="https://www.gstatic.com">
  <link rel="dns-prefetch" href="https://firestore.googleapis.com">
  <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com">
  <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">

  <!-- Critical CSS first (blocking is OK — small files) -->
  <link rel="stylesheet" href="./styles/variables.css">
  <link rel="stylesheet" href="./styles/reset.css">
  <link rel="stylesheet" href="./styles/base.css">
  <link rel="stylesheet" href="./styles/titlebar.css">
  <link rel="stylesheet" href="./styles/auth.css">
  <link rel="stylesheet" href="./styles/navigation.css">
  <link rel="stylesheet" href="./styles/dashboard.css">
  <link rel="stylesheet" href="./styles/animations.css">
  <link rel="stylesheet" href="./styles/global-polish.css">

  <!-- Fonts with display=swap — text shows immediately in fallback font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Кастомний titlebar -->
  <div class="titlebar">
    <div class="titlebar-drag">
      <div class="titlebar-logo"><img src="../../assets/icon.png" style="width:18px;height:18px;object-fit:contain;border-radius:3px;display:block"></div>
      <span class="titlebar-name">WorkHub</span>
    </div>
    <div class="titlebar-controls">
      <button class="tb-btn" id="tb-minimize" title="Згорнути">
        <svg width="10" height="1" viewBox="0 0 10 1" fill="currentColor"><rect width="10" height="1" rx="0.5"/></svg>
      </button>
      <button class="tb-btn" id="tb-maximize" title="Розгорнути">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="0.6" y="0.6" width="8.8" height="8.8" rx="1.5"/></svg>
      </button>
      <button class="tb-btn tb-close" id="tb-close" title="Закрити">
        <svg width="10" height="10" viewBox="0 0 10 10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/></svg>
      </button>
    </div>
  </div>

  <!-- App -->
  <div id="app">
    <div id="page-container"></div>
  </div>
  <!-- jsPDF and Chart.js load async — do NOT block app startup -->
  <script async src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script async src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
