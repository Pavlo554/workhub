name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-modules-win
        with:
          path: node_modules
          key: node-modules-win-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-modules-win.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\electron\Cache
          key: electron-win-${{ hashFiles('package-lock.json') }}

      - run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-modules-linux
        with:
          path: node_modules
          key: node-modules-linux-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-modules-linux.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: electron-linux-${{ hashFiles('package-lock.json') }}

      - run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
